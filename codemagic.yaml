# Codemagic CI — https://codemagic.io/apps
# Repo: https://github.com/alert3002/dasrass
workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      android_signing:
        - dastrass_upload
      vars:
        API_BASE: https://api.dasrass.com/api
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Build APK (split per ABI)
        script: flutter build apk --release --split-per-abi --dart-define=API_BASE=$API_BASE
      - name: Build AAB (Google Play)
        script: flutter build appbundle --release --dart-define=API_BASE=$API_BASE
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab

  ios-release:
    name: iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dastrass.dastrassApp
      vars:
        API_BASE: https://api.dasrass.com/api
        APP_STORE_APPLE_ID: 6783342154
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Set build number from App Store Connect
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          BUILD_NUM=$((LATEST + 1))
          echo "Using build number: $BUILD_NUM (previous: $LATEST)"
          echo "BUILD_NUM=$BUILD_NUM" >> $CM_ENV
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUM \
            --dart-define=API_BASE=$API_BASE \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
